<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VedaAI - Local AI Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="brand-mark">V</div>
                    <div class="brand-text">
                        <strong>VedaAI</strong>
                        <span>Local AI Assistant</span>
                    </div>
                </div>
                <button class="new-chat-btn" id="newChatBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"></path>
                    </svg>
                    New Chat
                </button>
            </div>

            <!-- Chat History Section -->
            <div class="chat-history">
                <div class="history-title">Chat History</div>
                <div id="chatList" class="chat-list">
                    <!-- Chat items will be inserted here -->
                </div>
            </div>

            <!-- Sidebar Footer -->
            <div class="sidebar-footer">
                <button class="sidebar-btn" id="clearAllBtn" title="Clear all chats">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6h16zM10 11v6M14 11v6"></path>
                    </svg>
                    Clear All
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-container">
            <div class="chat-topbar">
                <div class="chat-title">
                    <div class="chat-title-label">Active Conversation</div>
                    <h2>VedaAI</h2>
                </div>
                <div class="chat-top-actions">
                    <span>Local AI Assistant</span>
                </div>
            </div>
            <!-- Chat Messages -->
            <div class="chat-messages" id="chatMessages">
                <!-- Welcome Message -->
                <div class="welcome-section">
                    <div class="welcome-icon">🤖</div>
                    <h1>VedaAI</h1>
                    <p>Local AI Assistant</p>
                    <div class="welcome-subtext">Start a conversation to interact with your local AI</div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="chat-input-section">
                <div class="input-wrapper">
                    <textarea 
                        id="userInput" 
                        class="chat-input" 
                        placeholder="Ask me anything... (Shift+Enter for new line, Enter to send)"
                        rows="1"
                    ></textarea>
                    <button class="send-btn" id="sendBtn" title="Send message (Enter)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M16.6915026,12.4744748 L3.50612381,13.2599618 C3.19218622,13.2599618 3.03521743,13.4170592 3.03521743,13.5741566 L1.15159189,20.0151496 C0.8376543,20.8006365 0.99,21.89 1.77946707,22.52 C2.41,22.99 3.50612381,23.1 4.13399899,22.8429026 L21.714504,14.0454487 C22.6563168,13.5741566 23.1272231,12.6315722 22.6563168,11.6889879 L4.13399899,1.16346272 C3.34915502,0.9 2.40734225,1.00636533 1.77946707,1.4776575 C0.994623095,2.10604706 0.837654326,3.0486314 1.15159189,3.99701575 L3.03521743,10.4380088 C3.03521743,10.5951061 3.19218622,10.7522035 3.50612381,10.7522035 L16.6915026,11.5376905 C16.6915026,11.5376905 17.1624089,11.5376905 17.1624089,12.0089827 C17.1624089,12.4744748 16.6915026,12.4744748 16.6915026,12.4744748 Z"></path>
                        </svg>
                    </button>
                </div>
                <div class="input-hint">
                    Press <kbd>Enter</kbd> to send, <kbd>Shift+Enter</kbd> for new line
                </div>
            </div>

            <!-- Error Banner -->
            <div id="errorBanner" class="error-banner hidden">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"></path>
                </svg>
                <span id="errorMessage">Connection failed. Please try again.</span>
            </div>
        </main>
    </div>

    <!-- Modals -->
    
    <!-- Rename Chat Modal -->
    <div id="renameModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Rename Chat</h2>
                <button class="modal-close" onclick="closeRenameModal()">×</button>
            </div>
            <div class="modal-body">
                <input type="text" id="renameInput" class="input-field" placeholder="Enter new chat name">
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeRenameModal()">Cancel</button>
                <button class="btn-confirm" onclick="confirmRename()">Rename</button>
            </div>
        </div>
    </div>

    <!-- Context Menu -->
    <div id="contextMenu" class="context-menu hidden">
        <button class="context-item" id="renameOption">Rename</button>
        <button class="context-item delete" id="deleteOption">Delete</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
